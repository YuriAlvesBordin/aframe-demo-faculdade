<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Demo 02 — Iluminacao</title>
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <style>
    #back {
      position: fixed; top: 16px; left: 16px; z-index: 9999;
      background: rgba(0,0,0,0.6); color: #fff; padding: 8px 16px;
      border-radius: 8px; text-decoration: none; font-family: system-ui; font-size: 0.85rem;
      pointer-events: auto;
    }
    #back:hover { background: rgba(255,255,255,0.15); }
    #info {
      position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
      background: rgba(0,0,0,0.7); color: #777; padding: 8px 20px;
      border-radius: 6px; font-family: 'IBM Plex Mono', monospace; font-size: 0.7rem;
      pointer-events: none; border: 1px solid #222;
    }
    a-scene { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; }
  </style>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono&display=swap" rel="stylesheet">
</head>
<body>
  <a href="../index.html" id="back">&#8592; Voltar</a>
  <div id="info">point light &nbsp;&mdash;&nbsp; emissive &nbsp;&mdash;&nbsp; metalness &nbsp;&mdash;&nbsp; Arraste para girar</div>

  <a-scene background="color: #020202">

    <a-light type="ambient" color="#ffffff" intensity="0.03"></a-light>

    <!-- NUCLEO -->
    <a-sphere position="0 1.6 -5" radius="1.1"
      material="color:#1a1a2e; roughness:0.1; metalness:0.95; emissive:#0a0a1a; emissiveIntensity:0.3">
    </a-sphere>

    <!-- ELETRON 1: vermelho, plano horizontal (sem inclinacao) -->
    <a-entity position="0 1.6 -5">
      <a-entity animation="property:rotation; from:0 0 0; to:0 360 0; loop:true; dur:3000; easing:linear">
        <a-entity position="2.4 0 0">
          <a-sphere radius="0.18" material="color:#ff2200; emissive:#ff2200; emissiveIntensity:1; roughness:0; metalness:0"></a-sphere>
          <a-light type="point" color="#ff2200" intensity="2.5" distance="7" decay="2"></a-light>
        </a-entity>
      </a-entity>
    </a-entity>

    <!-- ELETRON 2: azul, plano inclinado 60deg no eixo Z -->
    <a-entity position="0 1.6 -5" rotation="0 0 60">
      <a-entity animation="property:rotation; from:0 0 0; to:0 360 0; loop:true; dur:4500; easing:linear">
        <a-entity position="2.4 0 0">
          <a-sphere radius="0.18" material="color:#2979ff; emissive:#2979ff; emissiveIntensity:1; roughness:0; metalness:0"></a-sphere>
          <a-light type="point" color="#2979ff" intensity="2.5" distance="7" decay="2"></a-light>
        </a-entity>
      </a-entity>
    </a-entity>

    <!-- ELETRON 3: verde, plano inclinado -60deg no eixo Z -->
    <a-entity position="0 1.6 -5" rotation="0 0 -60">
      <a-entity animation="property:rotation; from:0 0 0; to:0 360 0; loop:true; dur:6000; easing:linear">
        <a-entity position="2.4 0 0">
          <a-sphere radius="0.18" material="color:#00e676; emissive:#00e676; emissiveIntensity:1; roughness:0; metalness:0"></a-sphere>
          <a-light type="point" color="#00e676" intensity="2.5" distance="7" decay="2"></a-light>
        </a-entity>
      </a-entity>
    </a-entity>

    <!-- ELETRON 4: amarelo, plano vertical (90deg no eixo Z) -->
    <a-entity position="0 1.6 -5" rotation="0 0 90">
      <a-entity animation="property:rotation; from:0 0 0; to:0 360 0; loop:true; dur:5200; easing:linear">
        <a-entity position="2.4 0 0">
          <a-sphere radius="0.18" material="color:#ffd600; emissive:#ffd600; emissiveIntensity:1; roughness:0; metalness:0"></a-sphere>
          <a-light type="point" color="#ffd600" intensity="2.5" distance="7" decay="2"></a-light>
        </a-entity>
      </a-entity>
    </a-entity>

    <a-camera position="0 1.6 0" look-controls wasd-controls></a-camera>

  </a-scene>
</body>
</html>
