<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Demo 03 AR — Modelo 3D Externo</title>
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono&family=IBM+Plex+Sans:wght@400;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { overflow: hidden; font-family: 'IBM Plex Mono', monospace; background: #000; }
    #hud {
      position: fixed; top: 0; left: 0; right: 0; z-index: 9999;
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 18px;
      background: rgba(0,0,0,0.6); backdrop-filter: blur(6px);
      border-bottom: 1px solid #1a1a1a; pointer-events: none;
    }
    #hud .badge { font-size: 0.6rem; letter-spacing: 2px; text-transform: uppercase; color: #2979ff; background: rgba(41,121,255,0.1); border: 1px solid #2979ff; border-radius: 4px; padding: 3px 8px; }
    #hud .title { font-size: 0.75rem; color: #f0f0f0; letter-spacing: 1px; }
    #hud .sub   { font-size: 0.6rem; color: #555; letter-spacing: 1px; }
    #back {
      position: fixed; top: 56px; left: 16px; z-index: 9999;
      background: rgba(0,0,0,0.6); color: #fff; padding: 7px 14px;
      border-radius: 8px; text-decoration: none; font-size: 0.78rem; pointer-events: auto;
    }
    #back:hover { background: rgba(255,255,255,0.1); }

    /* Tela de upload (visível antes de carregar modelo) */
    #drop-screen {
      position: fixed; inset: 0; z-index: 8000;
      display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px;
      background: rgba(0,0,0,0.88);
    }
    #drop-screen p { font-size: 0.72rem; color: #555; text-align: center; max-width: 260px; line-height: 1.7; }
    #drop-zone {
      width: 280px; border: 2px dashed #2a2a2a; border-radius: 12px;
      padding: 36px 24px; text-align: center; cursor: pointer;
      transition: border-color 0.2s, background 0.2s; background: #111;
    }
    #drop-zone.over { border-color: #2979ff; background: rgba(41,121,255,0.05); }
    #drop-zone strong { display: block; font-size: 0.85rem; color: #f0f0f0; margin-bottom: 6px; font-family: 'IBM Plex Sans', sans-serif; }
    #drop-zone span { font-size: 0.68rem; color: #555; }
    #btn-pick {
      background: #2979ff; color: #fff; border: none;
      padding: 10px 28px; border-radius: 6px;
      font-family: 'IBM Plex Mono', monospace; font-size: 0.73rem;
      font-weight: 600; letter-spacing: 1px; text-transform: uppercase;
      cursor: pointer; transition: background 0.15s;
    }
    #btn-pick:hover { background: #448aff; }
    #file-input { display: none; }

    /* HUD inferior (após carregar modelo) */
    #model-hud {
      position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
      z-index: 9999; display: none; align-items: center; gap: 12px;
      background: rgba(0,0,0,0.75); border: 1px solid #222;
      border-radius: 8px; padding: 10px 20px; pointer-events: auto;
    }
    #model-hud strong { font-size: 0.7rem; color: #2979ff; white-space: nowrap; }
    #btn-remove {
      background: none; border: 1px solid #333; color: #aaa;
      padding: 5px 12px; border-radius: 5px;
      font-family: 'IBM Plex Mono', monospace; font-size: 0.65rem;
      cursor: pointer; letter-spacing: 1px; text-transform: uppercase;
      transition: border-color 0.15s, color 0.15s;
    }
    #btn-remove:hover { border-color: #ff2200; color: #ff2200; }
  </style>
</head>
<body>
  <div id="hud">
    <span class="badge">AR</span>
    <span class="title">Demo 03 — Modelo 3D Externo</span>
    <span class="sub">Marcador Hiro</span>
  </div>
  <a href="demo3.html" id="back">&#8592; Sair do AR</a>

  <div id="drop-screen">
    <div id="drop-zone">
      <strong>Selecione um modelo 3D</strong>
      <span>.glb &nbsp;·&nbsp; .gltf &nbsp;·&nbsp; .obj</span>
    </div>
    <button id="btn-pick">Selecionar arquivo</button>
    <p>O modelo será exibido sobre o<br>marcador <strong style="color:#2979ff">Hiro</strong> em AR.</p>
    <input type="file" id="file-input" accept=".glb,.gltf,.obj">
  </div>

  <div id="model-hud">
    <strong id="hud-name"></strong>
    <button id="btn-remove">Remover</button>
  </div>

  <a-scene
    embedded
    arjs="sourceType: webcam; debugUIEnabled: false;"
    vr-mode-ui="enabled: false"
    renderer="logarithmicDepthBuffer: true; antialias: true;"
    loading-screen="enabled: false"
  >
    <a-entity camera></a-entity>

    <a-marker preset="hiro" id="marker">
      <a-entity id="model-wrapper" position="0 0 0"></a-entity>
      <a-light type="ambient"     color="#ffffff" intensity="0.6"></a-light>
      <a-light type="directional" color="#ffffff" intensity="1.5" position="1 2 1"></a-light>
    </a-marker>
  </a-scene>

  <script>
    const dropScreen = document.getElementById('drop-screen');
    const dropZone   = document.getElementById('drop-zone');
    const fileInput  = document.getElementById('file-input');
    const btnPick    = document.getElementById('btn-pick');
    const modelHud   = document.getElementById('model-hud');
    const hudName    = document.getElementById('hud-name');
    const btnRemove  = document.getElementById('btn-remove');
    const wrapper    = document.getElementById('model-wrapper');
    let blobURL = null, modelEl = null;

    btnPick.addEventListener('click', () => fileInput.click());
    dropZone.addEventListener('click', () => fileInput.click());
    dropZone.addEventListener('dragover',  e => { e.preventDefault(); dropZone.classList.add('over'); });
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('over'));
    dropZone.addEventListener('drop', e => { e.preventDefault(); dropZone.classList.remove('over'); if(e.dataTransfer.files[0]) loadFile(e.dataTransfer.files[0]); });
    fileInput.addEventListener('change', e => { if(e.target.files[0]) loadFile(e.target.files[0]); });

    function clearModel() {
      if(modelEl && modelEl.parentNode) modelEl.parentNode.removeChild(modelEl);
      modelEl = null;
      if(blobURL){ URL.revokeObjectURL(blobURL); blobURL = null; }
    }

    function loadFile(file) {
      const ext = file.name.split('.').pop().toLowerCase();
      if(!['glb','gltf','obj'].includes(ext)){ alert('Use .glb, .gltf ou .obj'); return; }
      clearModel();
      blobURL  = URL.createObjectURL(file);
      modelEl  = document.createElement('a-entity');
      if(ext==='obj') modelEl.setAttribute('obj-model', 'obj: '+blobURL);
      else            modelEl.setAttribute('gltf-model', blobURL);
      // escala inicial pequena para caber sobre o marcador (ajustado após load)
      modelEl.setAttribute('scale', '0.3 0.3 0.3');
      wrapper.appendChild(modelEl);
      modelEl.addEventListener('model-loaded', () => {
        const obj = modelEl.getObject3D('mesh');
        if(!obj) return;
        obj.updateMatrixWorld(true);
        const box    = new THREE.Box3().setFromObject(obj);
        const size   = new THREE.Vector3(); const center = new THREE.Vector3();
        box.getSize(size); box.getCenter(center);
        const maxDim = Math.max(size.x, size.y, size.z);
        // cabe dentro de ~0.8 unidades (marcador Hiro ≈ 1 unidade)
        const scale  = maxDim > 0 ? (0.8 / maxDim) : 0.3;
        modelEl.object3D.scale.set(scale, scale, scale);
        modelEl.object3D.position.set(-center.x*scale, -center.y*scale + 0.1, -center.z*scale);
        hudName.textContent = file.name;
        dropScreen.style.display = 'none';
        modelHud.style.display   = 'flex';
      });
      modelEl.addEventListener('model-error', () => { alert('Erro ao carregar o modelo.'); clearModel(); });
    }

    btnRemove.addEventListener('click', () => {
      clearModel(); fileInput.value = '';
      modelHud.style.display = 'none'; dropScreen.style.display = 'flex';
    });
  </script>
</body>
</html>
