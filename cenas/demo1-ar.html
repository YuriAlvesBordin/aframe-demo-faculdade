<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Demo 01 AR — Primitivos em Morphing</title>
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { overflow: hidden; font-family: 'IBM Plex Mono', monospace; background: #000; }
    #hud {
      position: fixed; top: 0; left: 0; right: 0; z-index: 9999;
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 18px;
      background: rgba(0,0,0,0.6); backdrop-filter: blur(6px);
      border-bottom: 1px solid #1a1a1a; pointer-events: none;
    }
    #hud .badge { font-size: 0.6rem; letter-spacing: 2px; text-transform: uppercase; color: #00c853; background: rgba(0,200,83,0.1); border: 1px solid #00c853; border-radius: 4px; padding: 3px 8px; }
    #hud .title { font-size: 0.75rem; color: #f0f0f0; letter-spacing: 1px; }
    #hud .sub   { font-size: 0.6rem; color: #555; letter-spacing: 1px; }
    #back {
      position: fixed; top: 56px; left: 16px; z-index: 9999;
      background: rgba(0,0,0,0.6); color: #fff; padding: 7px 14px;
      border-radius: 8px; text-decoration: none; font-size: 0.78rem; pointer-events: auto;
    }
    #back:hover { background: rgba(255,255,255,0.1); }
    #info {
      position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%);
      z-index: 9999; pointer-events: none;
      background: rgba(0,0,0,0.7); border: 1px solid #333;
      border-radius: 8px; padding: 10px 22px;
      font-size: 0.7rem; color: #777; text-align: center; white-space: nowrap;
    }
    #info span { color: #00c853; }
  </style>
</head>
<body>
  <div id="hud">
    <span class="badge">AR</span>
    <span class="title">Demo 01 — Primitivos em Morphing</span>
    <span class="sub">Marcador Hiro</span>
  </div>
  <a href="demo1.html" id="back">&#8592; Sair do AR</a>
  <div id="info">Primitivo atual: <span id="prim-name">a-box</span></div>

  <a-scene
    embedded
    arjs="sourceType: webcam; debugUIEnabled: false;"
    vr-mode-ui="enabled: false"
    renderer="logarithmicDepthBuffer: true; antialias: true;"
    loading-screen="enabled: false"
  >
    <a-entity camera></a-entity>

    <a-marker preset="hiro" id="marker">
      <a-entity id="shape" position="0 0.5 0"></a-entity>
      <a-light type="point" color="#4488ff" intensity="1.5" distance="5" position="0 2 0"></a-light>
      <a-light type="ambient" color="#ffffff" intensity="0.5"></a-light>
    </a-marker>
  </a-scene>

  <script>
    const PRIMITIVES = [
      { tag: 'a-box',          attrs: {} },
      { tag: 'a-sphere',       attrs: { radius: '0.4' } },
      { tag: 'a-cylinder',     attrs: { radius: '0.32', height: '0.6' } },
      { tag: 'a-cone',         attrs: { 'radius-bottom': '0.36', height: '0.7' } },
      { tag: 'a-torus',        attrs: { radius: '0.36', 'radius-tubular': '0.08' } },
      { tag: 'a-torus-knot',   attrs: { radius: '0.32', 'radius-tubular': '0.04' } },
      { tag: 'a-icosahedron',  attrs: { radius: '0.4' } },
      { tag: 'a-dodecahedron', attrs: { radius: '0.4' } },
      { tag: 'a-octahedron',   attrs: { radius: '0.4' } },
      { tag: 'a-tetrahedron',  attrs: { radius: '0.4' } },
    ];
    const COLORS = ['#00c853','#ffd600','#2979ff','#ff1a1a','#00e5ff','#ff6d00','#d500f9','#76ff03','#f50057','#ffffff'];
    let current = null, index = 0;
    const container = document.getElementById('shape');
    const nameEl    = document.getElementById('prim-name');
    const INTERVAL  = 2800, FADE_MS = 600;

    function randColor() { return COLORS[Math.floor(Math.random() * COLORS.length)]; }
    function randFloat(min, max) { return (Math.random() * (max - min) + min).toFixed(2); }
    function buildMaterial() {
      const metalness   = randFloat(0, 1);
      const roughness   = randFloat(0, 1);
      const opacity     = randFloat(0.35, 1);
      const color       = randColor();
      const emissive    = Math.random() > 0.6 ? randColor() : '#000000';
      const wireframe   = Math.random() > 0.85 ? 'true' : 'false';
      const transparent = opacity < 0.99 ? 'true' : 'false';
      return `color:${color}; roughness:${roughness}; metalness:${metalness}; opacity:${opacity}; transparent:${transparent}; emissive:${emissive}; emissiveIntensity:0.4; wireframe:${wireframe}`;
    }

    function spawnNext() {
      const def = PRIMITIVES[index % PRIMITIVES.length]; index++;
      const el  = document.createElement(def.tag);
      for (const [k, v] of Object.entries(def.attrs)) el.setAttribute(k, v);
      el.setAttribute('material', buildMaterial());
      el.setAttribute('scale', '0.001 0.001 0.001');
      el.setAttribute('rotation', `${Math.random()*360} ${Math.random()*360} ${Math.random()*360}`);
      el.setAttribute('animation__rot', 'property:rotation; to:' + `${Math.random()*720} ${360+Math.random()*360} ${Math.random()*360}` + '; dur:' + (INTERVAL*4) + '; easing:linear; loop:true');
      el.setAttribute('animation__scale_in', 'property:scale; from:0.001 0.001 0.001; to:1 1 1; dur:' + FADE_MS + '; easing:easeOutCubic');
      container.appendChild(el);
      nameEl.textContent = def.tag;
      if (current) {
        const dying = current;
        dying.setAttribute('animation__scale_out', 'property:scale; to:0.001 0.001 0.001; dur:' + FADE_MS + '; easing:easeInCubic');
        setTimeout(() => { if (dying.parentNode) dying.parentNode.removeChild(dying); }, FADE_MS + 50);
      }
      current = el;
    }

    document.querySelector('a-scene').addEventListener('loaded', () => {
      spawnNext();
      setInterval(spawnNext, INTERVAL);
    });
  </script>
</body>
</html>
