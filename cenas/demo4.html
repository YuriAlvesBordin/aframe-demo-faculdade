<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Demo 04 — AR [WIP]</title>

  <!-- A-Frame -->
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <!-- AR.js (marcador) -->
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      overflow: hidden;
      font-family: 'IBM Plex Mono', monospace;
      background: #000;
    }

    /* HUD superior */
    #hud {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 9999;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 18px;
      background: rgba(0,0,0,0.65);
      backdrop-filter: blur(6px);
      border-bottom: 1px solid #1a1a1a;
      pointer-events: none;
    }

    #hud .badge {
      font-size: 0.6rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #ff6d00;
      background: rgba(255,109,0,0.12);
      border: 1px solid #ff6d00;
      border-radius: 4px;
      padding: 3px 8px;
    }

    #hud .title {
      font-size: 0.75rem;
      color: #f0f0f0;
      letter-spacing: 1px;
    }

    #hud .status {
      font-size: 0.6rem;
      color: #555;
      letter-spacing: 1px;
    }

    /* Instrução central */
    #tip {
      position: fixed;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 9999;
      background: rgba(0,0,0,0.75);
      border: 1px solid #222;
      border-radius: 8px;
      padding: 10px 22px;
      font-size: 0.68rem;
      color: #777;
      text-align: center;
      pointer-events: none;
      white-space: nowrap;
      letter-spacing: 0.5px;
    }

    #tip span { color: #00c853; }

    /* Link voltar */
    #back {
      position: fixed;
      top: 56px; left: 16px;
      z-index: 9999;
      background: rgba(0,0,0,0.6);
      color: #fff;
      padding: 7px 14px;
      border-radius: 8px;
      text-decoration: none;
      font-size: 0.78rem;
      pointer-events: auto;
    }
    #back:hover { background: rgba(255,255,255,0.1); }
  </style>
</head>
<body>

  <div id="hud">
    <span class="badge">WIP</span>
    <span class="title">Demo 04 — AR</span>
    <span class="status">AR.js · Marcador Hiro</span>
  </div>

  <a href="../index.html" id="back">&#8592; Voltar</a>

  <div id="tip">
    Aponte a câmera para o marcador <span>Hiro</span> para ver o objeto 3D
  </div>

  <!--
    AR.js detecta o marcador "hiro" (padrão clássico).
    Para testar, imprima ou abra no PC: https://jeromeetienne.github.io/AR.js/data/images/HIRO.jpg

    Atributos da cena:
      - embedded: necessário para AR.js funcionar dentro do body
      - arjs: configura a fonte de vídeo e a suavização de rastreamento
      - vr-mode-ui: desativado (não faz sentido em AR)
  -->
  <a-scene
    embedded
    arjs="sourceType: webcam; debugUIEnabled: false; detectionMode: mono_and_matrix; matrixCodeType: 3x3;"
    vr-mode-ui="enabled: false"
    renderer="logarithmicDepthBuffer: true; antialias: true;"
    loading-screen="enabled: false"
  >

    <!-- Câmera AR (controlada pelo AR.js) -->
    <a-entity camera></a-entity>

    <!-- Marcador Hiro padrão -->
    <a-marker preset="hiro" id="marker">

      <!--
        OBJETO 3D SOBRE O MARCADOR
        Posição y=0.5 → flutua levemente acima do marcador.
        Substitua este bloco pelo objeto que quiser desenvolver.
      -->

      <!-- Núcleo central -->
      <a-sphere
        position="0 0.5 0"
        radius="0.3"
        material="color: #2979ff; roughness: 0.1; metalness: 0.9; emissive: #112244; emissiveIntensity: 0.4"
        animation="property: rotation; to: 0 360 0; dur: 4000; easing: linear; loop: true"
      ></a-sphere>

      <!-- Anel orbital -->
      <a-torus
        position="0 0.5 0"
        radius="0.6"
        radius-tubular="0.018"
        material="color: #00c853; roughness: 0; metalness: 1; emissive: #00c853; emissiveIntensity: 0.6"
        rotation="75 0 0"
        animation="property: rotation; from: 75 0 0; to: 75 360 0; dur: 3200; easing: linear; loop: true"
      ></a-torus>

      <!-- Elétron -->
      <a-entity
        position="0 0.5 0"
        animation="property: rotation; from: 0 0 0; to: 0 360 0; dur: 3200; easing: linear; loop: true"
      >
        <a-sphere
          position="0.6 0 0"
          radius="0.09"
          material="color: #00e5ff; roughness: 0; metalness: 0; emissive: #00e5ff; emissiveIntensity: 1"
        ></a-sphere>
      </a-entity>

      <!-- Luz pontual colorida sobre o objeto -->
      <a-light type="point" color="#2979ff" intensity="1.5" distance="3" position="0 1 0"></a-light>

    </a-marker>

  </a-scene>

</body>
</html>
